<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locked In - Narrative Adventure</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="game-container">

        <div id="scene-bedroom" class="scene active">a
            <img id="wardrobe-open" src="../pictures/Bedroom/left%20closet%20open.png" class="overlay hidden"
                alt="Open Wardrobe">
            <img id="drawer-open" src="../pictures/Bedroom/drawer%20open%20and%20take%20the%20key%20from%20there.png" class="overlay hidden"
                alt="Open Drawer">

            <div class="hotspot" style="top: 25%; left: 8%; width: 16%; height: 45%;" onclick="interact('wardrobe')">
            </div>

            <div id="bedroom-phone-hotspot" class="hotspot" style="top: 48%; left: 91%; width: 4%; height: 10%;"
                onclick="interact('phone')"></div>
            <div class="hotspot" style="top: 58%; left: 75%; width: 6%; height: 7%;" onclick="interact('Drawer')"></div>

            <!-- Door button to go to Living Room in marked place -->
            <button class="nav-btn" style="top: 12%; left: 59%; transform: translate(-50%, -50%);"
                onclick="navigateTo('livingroom')">Go to Living Room
                &rarr;</button>
        </div>

        <div id="scene-livingroom" class="scene">
            <img id="tv-drawers-open" src="../pictures/Livingroom/wooden%20door%20opens.png" class="overlay hidden" alt="Open TV Drawers">
            <img id="glass-cabinet-open" src="../pictures/Livingroom/Living%20room%20glass%20door%20open.png" class="overlay hidden" alt="Open Glass Cabinet">
            <img id="both-doors-open" src="../pictures/Livingroom/both%20doors%20opens.png" class="overlay hidden" alt="Both Doors Open">
            <div class="hotspot" style="top: 7%; left: 15%; width: 22%; height: 60%;"
                onclick="interact('glass_cabinet')">
            </div>
            <div class="hotspot" style="top: 63%; left: 65%; width: 17%; height: 20%;" onclick="interact('tv_drawers')">
            </div>

            <button class="nav-btn nav-left" onclick="navigateTo('bedroom')">&larr; Bedroom</button>
            <button class="nav-btn nav-right" onclick="navigateTo('kitchen')">Kitchen &rarr;</button>
            <button class="nav-btn nav-down" onclick="navigateTo('entrance')">Go to Front Door &darr;</button>
        </div>

        <div id="scene-kitchen" class="scene">
            <img id="kitchen-bowl-found" src="../pictures/Kitchen/Find key the bowl.png" class="overlay hidden" alt="Keys in Bowl">
            <img id="kitchen-upper-open" src="../pictures/Kitchen/Kitchen upper door open.png" class="overlay hidden" alt="Upper Cabinet Open">
            <img id="kitchen-lower-open" src="../pictures/Kitchen/Kitchen lower door open.png" class="overlay hidden" alt="Lower Cabinet Open">
            <img id="kitchen-both-open" src="../pictures/Kitchen/both doors open.png" class="overlay hidden" alt="Both Cabinets Open">

            <div class="hotspot" style="top: 10%; left: 73%; width: 13%; height: 26%;"
                onclick="interact('island_drawers')">
            </div>
            <div class="hotspot" style="top: 55%; left: 0%; width: 15%; height: 30%;" onclick="interact('oven')"></div>
            <div class="hotspot" style="top: 46.5%; left: 37%; width: 7%; height: 9%;" onclick="interact('kitchen_middle')"></div>

            <button class="nav-btn nav-left" onclick="navigateTo('livingroom')">&larr; Living Room</button>
        </div>

        <div id="scene-entrance" class="scene">
            <div class="hotspot" style="top: 10%; left: 53%; width: 22%; height: 62%;" onclick="interact('front_door')"></div>
            <div class="hotspot" style="top: 58%; left: 45%; width: 3.5%; height: 14%; transform: rotate(55deg);" onclick="interact('hallway_table')"></div>
            <div id="keys-hotspot" class="hotspot" style="top: 60%; left: 40%; width: 5%; height: 5%;" onclick="interact('keys')"></div>

            <button class="nav-btn nav-up" onclick="navigateTo('livingroom')">&uarr; Back to Living Room</button>
        </div>

        <div id="combination-lock-ui" class="hidden">
            <div class="combination-lock-container">
                <div class="lock-body">
                    <div class="lock-digits">
                        <div class="lock-column">
                            <button class="arrow-btn up" onclick="changeDigit(0, 1)">&#9650;</button>
                            <div class="digit-display" id="digit-0">0</div>
                            <button class="arrow-btn down" onclick="changeDigit(0, -1)">&#9660;</button>
                        </div>
                        <div class="lock-column">
                            <button class="arrow-btn up" onclick="changeDigit(1, 1)">&#9650;</button>
                            <div class="digit-display" id="digit-1">0</div>
                            <button class="arrow-btn down" onclick="changeDigit(1, -1)">&#9660;</button>
                        </div>
                        <div class="lock-column">
                            <button class="arrow-btn up" onclick="changeDigit(2, 1)">&#9650;</button>
                            <div class="digit-display" id="digit-2">0</div>
                            <button class="arrow-btn down" onclick="changeDigit(2, -1)">&#9660;</button>
                        </div>
                        <div class="lock-column">
                            <button class="arrow-btn up" onclick="changeDigit(3, 1)">&#9650;</button>
                            <div class="digit-display" id="digit-3">0</div>
                            <button class="arrow-btn down" onclick="changeDigit(3, -1)">&#9660;</button>
                        </div>
                    </div>
                    <div class="lock-actions">
                        <button class="lock-btn submit" onclick="checkLock()">Try Open</button>
                        <button class="lock-btn cancel" onclick="closeLock()">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="dialogue-container" class="hidden" onclick="advanceDialogue()">
            <div id="dialogue-speaker">Spouse via Text</div>
            <div id="dialogue-text">"Hey honey! I left early..."</div>
            <div class="dialogue-arrow">&#x25BC;</div>
        </div>

        <div id="incoming-call-ui" class="hidden">
            <div class="phone-screen-container">
                <img src="../pictures/Phone/income call.png" alt="Incoming Call">
                <div class="hotspot decline-btn" onclick="declineCall()"></div>
                <div class="hotspot accept-btn" onclick="acceptCall()"></div>
            </div>
        </div>

        <div id="inventory-bar">
            <h3>Inventory:</h3>
            <div id="inventory-slots">
            </div>
        </div>

    </div>

    <script src="game.js"></script>
</body>

</html>
