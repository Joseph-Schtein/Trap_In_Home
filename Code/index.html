<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locked In - Narrative Adventure</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="game-container">

        <div id="scene-bedroom" class="scene active">
            <img id="wardrobe-open" src="../pictures/Bedroom/Bedroom start.png" class="overlay hidden"
                alt="Open Wardrobe">

            <div id="bedroom-phone-hotspot" class="hotspot" style="top: 48%; left: 91%; width: 4%; height: 10%;"
                onclick="interact('bedroom_dresser')"></div>
        </div>
        <div class="hotspot" style="top: 15%; left: 65%; width: 15%; height: 15%;" onclick="interact('alarm_clock')">
        </div>
        <div class="hotspot" style="top: 60%; left: 75%; width: 20%; height: 25%;"
            onclick="interact('bedroom_dresser')"></div>

        <button class="nav-btn nav-right" onclick="navigateTo('livingroom')">Go to Living Room &rarr;</button>
    </div>

    <div id="scene-livingroom" class="scene">
        <div class="hotspot" style="top: 15%; left: 5%; width: 25%; height: 70%;" onclick="interact('glass_cabinet')">
        </div>
        <div class="hotspot" style="top: 65%; left: 40%; width: 45%; height: 20%;" onclick="interact('tv_drawers')">
        </div>

        <button class="nav-btn nav-left" onclick="navigateTo('bedroom')">&larr; Bedroom</button>
        <button class="nav-btn nav-right" onclick="navigateTo('kitchen')">Kitchen &rarr;</button>
        <button class="nav-btn nav-down" onclick="navigateTo('entrance')">Go to Front Door &darr;</button>
    </div>

    <div id="scene-kitchen" class="scene">
        <img id="island-drawer-open" src="../pictures/Kitchen/Kitchen lower door open.png" class="overlay hidden"
            alt="Open Drawer">

        <div class="hotspot" style="top: 55%; left: 35%; width: 40%; height: 35%;" onclick="interact('island_drawers')">
        </div>
        <div class="hotspot" style="top: 35%; left: 5%; width: 15%; height: 40%;" onclick="interact('oven')"></div>

        <button class="nav-btn nav-left" onclick="navigateTo('livingroom')">&larr; Living Room</button>
    </div>

    <div id="scene-entrance" class="scene">
        <div class="hotspot" style="top: 10%; left: 40%; width: 30%; height: 80%;" onclick="interact('front_door')">
        </div>
        <div class="hotspot" style="top: 60%; left: 5%; width: 25%; height: 30%;" onclick="interact('hallway_table')">
        </div>

        <button class="nav-btn nav-up" onclick="navigateTo('livingroom')">&uarr; Back to Living Room</button>
    </div>

    <div id="dialogue-container" class="hidden" onclick="advanceDialogue()">
        <div id="dialogue-speaker">Spouse via Text</div>
        <div id="dialogue-text">"Hey honey! I left early..."</div>
        <div class="dialogue-arrow">&#x25BC;</div>
    </div>

    <div id="inventory-bar">
        <h3>Inventory:</h3>
        <div id="inventory-slots">
        </div>
    </div>

    </div>

    <script src="game.js"></script>
</body>

</html>
